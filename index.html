function rowAlumno(s){
 const d=docState(s.dni); const empresa=s.empresaAsignada||s.empresaDetectada||s.empresaBase||''; const horas=Number(d.horas||s.horasRealizadas||0);
 return `<tr><td>${esc(s.curso)}</td><td>${esc(s.ranking)}</td><td><b>${esc(s.nombre)}</b><br><button class="btn secondary" onclick="openAlumno('${esc(s.dni)}')">Ficha</button></td><td>${esc(s.dni)}</td><td>${esc(s.celAlumno)}</td><td>${esc(s.telAdulto)}</td><td>${esc(empresa)}</td><td>${esc(s.proximaEmpresa||s.destino||'A definir')}</td><td>${esc(s.pid)}</td><td><input type="number" min="0" value="${horas}" onchange="saveDoc('${esc(s.dni)}','horas',this.value)" style="width:80px"></td><td>${badge(s.estado)}</td><td><label><input type="checkbox" ${d.cv?'checked':''} onchange="saveDoc('${esc(s.dni)}','cv',this.checked)"> CV</label><br><label><input type="checkbox" ${d.act2?'checked':''} onchange="saveDoc('${esc(s.dni)}','act2',this.checked)"> Actividad 2</label><br><label><input type="checkbox" ${d.final?'checked':''} onchange="saveDoc('${esc(s.dni)}','final',this.checked)"> Informe final</label><br><label><input type="checkbox" ${d.eval?'checked':''} onchange="saveDoc('${esc(s.dni)}','eval',this.checked)"> Evaluación empresa</label></td><td><button class="btn" onclick="generateStudentReport('${esc(s.dni)}')">Generar</button></td></tr>`;
}
function openAlumno(dni){
 const s=allStudents().find(x=>String(x.dni)===String(dni)); if(!s)return; const d=docState(dni); const empresa=s.empresaAsignada||s.empresaDetectada||s.empresaBase||''; const det=(s.detallesEmpresa||[]).map(x=>`<li><b>${esc(x.empresa)}</b> · PID ${esc(x.pid||'-')}<br><small>${esc(x.detalle)}</small></li>`).join('')||'<li>Sin detalle de planilla de empresa.</li>';
 document.getElementById('modalBody').innerHTML=`<h2>${esc(s.nombre)}</h2><div class="cards"><div class="card"><h3>Datos del alumno</h3><b>Curso:</b> ${esc(s.curso)}<br><b>DNI:</b> ${esc(s.dni)}<br><b>Celular:</b> ${esc(s.celAlumno)}<br><b>Correo:</b> ${esc(s.email)}<br><b>Adulto responsable:</b> ${esc(s.telAdulto)}</div><div class="card"><h3>Práctica</h3><b>Empresa actual:</b> ${esc(empresa)}<br><b>Próxima empresa:</b> ${esc(s.proximaEmpresa||'A definir')}<br><b>PID:</b> ${esc(s.pid)}<br><b>Estado:</b> ${badge(s.estado)}<br><b>Horas:</b> ${esc(d.horas||s.horasRealizadas||0)}</div><div class="card"><h3>Documentación</h3>CV: ${d.cv?'Presentado':'Pendiente'}<br>Actividad 2: ${d.act2?'Presentada':'Pendiente'}<br>Informe final: ${d.final?'Presentado':'Pendiente'}<br>Evaluación empresa: ${d.eval?'Presentada':'Pendiente'}</div></div><h3>Detalle de planillas</h3><ul>${det}</ul><button class="btn" onclick="generateStudentReport('${esc(s.dni)}')">Generar informe del alumno</button>`;
 document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none'}
function renderEmpresas(){
 let map={}; allStudents().forEach(s=>{let e=s.empresaAsignada||s.empresaDetectada||s.empresaBase||'Sin asignar'; if(!map[e])map[e]=[]; map[e].push(s)});
 document.getElementById('content').innerHTML=`<h2>Empresas / fábricas</h2><div class="filters"><input id="qe" placeholder="Buscar empresa..." oninput="filterEmpresas()"><select id="se" onchange="filterEmpresas()"><option value="">Todas</option><option>EN CURSO</option><option>INICIO</option></select></div><div id="empresasList">${Object.entries(map).sort().map(([e,arr])=>empresaCard(e,arr)).join('')}</div>`;
}
function empresaCard(e,arr){let st=arr.map(x=>x.estado).join(' ');return `<div class="card empresaItem" data-search="${esc(nrm(e+' '+st+' '+arr.map(a=>a.nombre).join(' ')))}"><h3>${esc(e)}</h3><p>${badge(st.includes('EN CURSO')?'EN CURSO':(st.includes('INICIO')?'INICIO INMEDIATO':'Planificada'))} <span class="badge">${arr.length} alumnos</span></p><div class="table-wrap" style="max-height:300px"><table><tr><th>Alumno</th><th>Curso</th><th>DNI</th><th>PID</th><th>Estado</th></tr>${arr.map(a=>`<tr><td>${esc(a.nombre)}</td><td>${esc(a.curso)}</td><td>${esc(a.dni)}</td><td>${esc(a.pid)}</td><td>${badge(a.estado)}</td></tr>`).join('')}</table></div></div>`}
function filterEmpresas(){let q=nrm(document.getElementById('qe').value), se=nrm(document.getElementById('se').value);document.querySelectorAll('.empresaItem').forEach(el=>{let t=el.dataset.search;el.style.display=(!q||t.includes(q))&&(!se||t.includes(se))?'block':'none'})}
function renderReporteInicio(){
 const opts=allStudents().map(s=>`<option value="${esc(s.dni)}">${esc(s.curso+' - '+s.nombre+' - '+(s.empresaAsignada||s.empresaDetectada||''))}</option>`).join('');
 document.getElementById('content').innerHTML=`<h2>Reporte formal de inicio de prácticas</h2><p>Seleccione alumnos afectados a una práctica para generar una comunicación dirigida a jefes de área, vicedirector, docentes de taller y preceptores.</p><div class="filters"><select id="repStudents" multiple size="10" style="grid-column:span 2">${opts}</select><input id="repFecha" type="date"><input id="repHorario" placeholder="Horario, por ejemplo: 8:00 a 12:00"><input id="repEmpresa" placeholder="Empresa / sector"><input id="repDocente" placeholder="Docente referente"></div><button class="btn" onclick="makeStartReport()">Generar reporte</button><button class="btn secondary" onclick="copyReport()">Copiar texto</button><textarea id="reportText" placeholder="Aquí aparecerá el reporte formal..."></textarea>`;
}
function selectedStudents(){return Array.from(document.getElementById('repStudents').selectedOptions).map(o=>allStudents().find(s=>s.dni==o.value)).filter(Boolean)}
function makeStartReport(){
 const ss=selectedStudents(), fecha=document.getElementById('repFecha').value, horario=document.getElementById('repHorario').value, empresa=document.getElementById('repEmpresa').value||([...new Set(ss.map(s=>s.empresaAsignada||s.empresaDetectada).filter(Boolean))].join(', ')), docente=document.getElementById('repDocente').value||'Sequeira Diego';
 const listado=ss.map(s=>`- ${s.curso} · ${s.nombre} · DNI ${s.dni} · Empresa: ${s.empresaAsignada||s.empresaDetectada||empresa}`).join('\n');
 document.getElementById('reportText').value=`A los Jefes de Área, Vicedirección, docentes de taller y preceptores:\n\nPor medio de la presente se informa que, a partir del día ${fecha||'____/____/2026'}, los siguientes alumnos estarán afectados al desarrollo de sus Prácticas Profesionalizantes en la empresa/sector ${empresa||'________________'}, en el horario ${horario||'________________'}.\n\n${listado}\n\nSe solicita tener a bien comunicar la situación a los docentes correspondientes, preceptores y responsables de área, a fin de justificar las inasistencias vinculadas a la realización de las prácticas y adecuar las actividades, contenidos y evaluaciones de taller que pudieran superponerse con el horario informado.\n\nLa presente actividad forma parte de la trayectoria formativa obligatoria de los estudiantes del último año de la Tecnicatura en Electromecánica, en el marco de las Prácticas Profesionalizantes 2026.\n\nDocente referente: ${docente}\n\nSin otro particular, saludo atentamente.`;
}
function copyReport(){let t=document.getElementById('reportText');t.select();document.execCommand('copy')}
function generateStudentReport(dni){
 const s=allStudents().find(x=>String(x.dni)===String(dni)); const d=docState(dni); if(!s)return; const empresa=s.empresaAsignada||s.empresaDetectada||s.empresaBase||'A definir';
 const txt=`INFORME DE SEGUIMIENTO DE PRÁCTICAS PROFESIONALIZANTES 2026\n\nAlumno: ${s.nombre}\nCurso: ${s.curso}\nDNI: ${s.dni}\nEmpresa asignada: ${empresa}\nPróxima empresa: ${s.proximaEmpresa||'A definir'}\nPID: ${s.pid||'Sin registrar'}\nEstado actual: ${s.estado}\nHoras registradas: ${d.horas||s.horasRealizadas||0}\n\nDocumentación:\n- Currículum Vitae: ${d.cv?'Presentado':'Pendiente'}\n- Actividad N°2: ${d.act2?'Presentada':'Pendiente'}\n- Informe final: ${d.final?'Presentado':'Pendiente'}\n- Evaluación de empresa: ${d.eval?'Presentada':'Pendiente'}\n\nObservaciones: ${s.observaciones||'Sin observaciones cargadas.'}`;
 document.getElementById('modalBody').innerHTML=`<h2>Informe automático</h2><textarea id="studentReport">${esc(txt)}</textarea><button class="btn" onclick="copyStudentReport()">Copiar informe</button><button class="btn secondary" onclick="window.print()">Imprimir</button>`;
 document.getElementById('modal').style.display='flex';
}
function copyStudentReport(){let t=document.getElementById('studentReport');t.select();document.execCommand('copy')}
function renderDrives(){document.getElementById('content').innerHTML=`<h2>Drive: CV y Actividad 2</h2><div class="notice">La página estática permite abrir las carpetas y marcar manualmente si el alumno presentó CV o Actividad 2. Para verificación automática de archivos en Drive se requiere Google Apps Script o Drive API.</div><div class="cards"><div class="card"><h3>7°A</h3><a class="btn" target="_blank" href="${DATA.drives['7A']}">Abrir carpeta 7°A</a></div><div class="card"><h3>7°B</h3><a class="btn" target="_blank" href="${DATA.drives['7B']}">Abrir carpeta 7°B</a></div></div>`}
function renderDocs(){document.getElementById('content').innerHTML=`<h2>PDF y archivos descargables</h2><div class="notice">Para que descarguen desde GitHub Pages, los PDF y Excel deben estar subidos en el mismo repositorio que este index.html.</div><div class="cards">${DATA.downloads.map(d=>`<div class="card"><h3><i class="fa-solid fa-file-pdf"></i> ${esc(d.title)}</h3><p>${esc(d.desc)}</p><a class="btn" href="${encodeURI(d.file)}" download>Descargar</a></div>`).join('')}</div>`}
function renderAccidentes(){document.getElementById('content').innerHTML=`<h2>Instructivo: cómo actuar en caso de accidentes</h2><div class="notice"><b>Acción inmediata:</b> asistir al estudiante, avisar a la empresa, familia, escuela, equipo directivo y docente referente. Registrar fecha, hora, lugar y forma en que ocurrió el accidente.</div><div class="cards"><div class="card"><h3>1. Denuncia de siniestro</h3><p>Completar formulario FR-SIN-037 con datos del accidentado, contratante, lugar, fecha, hora y descripción del hecho.</p><a class="btn" href="fr-sin-037-01-accidentes-personales---denuncia-de-siniestros-1 (1)_0.pdf" download>Descargar formulario</a></div><div class="card"><h3>2. Documentación médica</h3><p>Adjuntar certificado médico, diagnóstico, facturas originales si corresponde reintegro y copia de DNI.</p><a class="btn" href="INSTRUCTIVO-Accidentes-Personales (2)_0.pdf" download>Descargar instructivo</a></div><div class="card"><h3>3. Seguro</h3><p>Póliza de Accidentes Personales vigente para trabajo e in-itinere.</p><a class="btn" href="TECNICA Poliza_16_2126630_0.pdf" download>Descargar póliza</a></div></div>`}
function renderReglamentacion(){document.getElementById('content').innerHTML=`<h2>Reglamentación vigente</h2><ul><li>Ley de Educación Nacional N° 26.206.</li><li>Ley de Educación de la Provincia de Buenos Aires N° 13.688.</li><li>Resolución N° 5356/2024 – Sistema PEAT.</li><li>Decreto 2299/11 – Artículo 30.</li><li>Ley 19.587 – Higiene y Seguridad en el Trabajo.</li><li>Ley 24.557 – Riesgos del Trabajo.</li></ul><a class="btn" href="como evaluar las practicas profesionalizantes.pdf" download>Descargar material de prácticas</a>`}
function renderMultimedia(){
 let saved=[]; try{saved=JSON.parse(localStorage.getItem('mediaLinks')||'[]')}catch(e){}
 document.getElementById('content').innerHTML=`<h2>Fotos y videos relevantes</h2><div class="notice">Podés agregar nuevos enlaces de Instagram, TikTok, YouTube o Drive. Quedan guardados en este navegador.</div><div class="filters"><input id="mediaUrl" placeholder="Pegar enlace de video o foto"><input id="mediaTitle" placeholder="Título o descripción"><button class="btn green" onclick="addMedia()">Agregar</button></div><h3>Videos de Instagram cargados</h3><div class="video-grid">${DATA.videos.map((v,i)=>`<div class="video"><iframe src="${v.embed}" allowtransparency="true" allowfullscreen></iframe><div class="vbody"><b>Video ${i+1}</b><br><a target="_blank" href="${v.url}">Abrir en Instagram</a></div></div>`).join('')}${saved.map((v,i)=>`<div class="card"><h3>${esc(v.title||'Material agregado')}</h3><a target="_blank" href="${esc(v.url)}">${esc(v.url)}</a></div>`).join('')}</div>`;
}
function addMedia(){let url=document.getElementById('mediaUrl').value, title=document.getElementById('mediaTitle').value; if(!url)return; let arr=[];try{arr=JSON.parse(localStorage.getItem('mediaLinks')||'[]')}catch(e){} arr.push({url,title});localStorage.setItem('mediaLinks',JSON.stringify(arr));renderMultimedia()}
function renderContactosPanel(){document.getElementById('content').innerHTML=document.getElementById('contactos').outerHTML}
function renderFooter(){const c=DATA.contacts;document.getElementById('contactos').innerHTML=`<b>Contactos de emergencia e institucionales</b><br><b>Directora:</b> ${esc(c.directora)}<br><b>Vice-Director:</b> ${esc(c.vicedirector)}<br><b>Jefe de Área:</b> ${esc(c.jefeArea)}<br><b>Docentes referentes:</b> ${esc(c.docentes)}<br><b>E-mails:</b> ${esc(c.emails)}<br><b>Emergencias:</b> ${esc(c.emergencias)}`}
function openAddStudent(){document.getElementById('modalBody').innerHTML=`<h2>Agregar curso / alumno</h2><div class="cards"><input id="addCurso" placeholder="Curso, ej. 7C"><input id="addNombre" placeholder="Apellido y nombre"><input id="addDni" placeholder="DNI"><input id="addTel" placeholder="Teléfono adulto responsable"><input id="addCel" placeholder="Celular alumno"><input id="addEmpresa" placeholder="Empresa"><input id="addPid" placeholder="PID"><input id="addEstado" placeholder="Estado"></div><button class="btn green" onclick="saveNewStudent()">Guardar alumno</button>`;document.getElementById('modal').style.display='flex'}
function saveNewStudent(){let arr=customStudents();arr.push({curso:document.getElementById('addCurso').value,nombre:document.getElementById('addNombre').value,dni:document.getElementById('addDni').value,telAdulto:document.getElementById('addTel').value,celAlumno:document.getElementById('addCel').value,empresaAsignada:document.getElementById('addEmpresa').value,pid:document.getElementById('addPid').value,estado:document.getElementById('addEstado').value||'Pendiente',ranking:'',promedio:'',previas:'',email:'',proximaEmpresa:'A definir',horasRealizadas:0});localStorage.setItem('customStudents',JSON.stringify(arr));closeModal();renderStats();renderAlumnos()}
function exportCSV(){let rows=[['Curso','Ranking','Alumno','DNI','Tel alumno','Tel adulto','Empresa','PID','Estado','Horas']];allStudents().forEach(s=>{let d=docState(s.dni);rows.push([s.curso,s.ranking,s.nombre,s.dni,s.celAlumno,s.telAdulto,s.empresaAsignada||s.empresaDetectada||s.empresaBase,s.pid,s.estado,d.horas||s.horasRealizadas||0])});let csv=rows.map(r=>r.map(x=>`"${String(x??'').replace(/"/g,'""')}"`).join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='practicas_profesionalizantes_2026.csv';a.click()}
window.addEventListener('load',init);
</script>
</body>
</html>
