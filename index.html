let currentView='panel';
function init(){renderNav();renderStats();renderFooter();show('panel')}
function renderNav(){const items=[['panel','Panel'],['7A','Alumnos 7°A'],['7B','Alumnos 7°B'],['alumnos','Alumnos A-Z'],['empresas','Empresas'],['cfp','CFP 401'],['documentos','Descarga PDF'],['seguros','Seguros'],['accidentes','En caso de accidente'],['evaluacion','Evaluación'],['practicas','Prácticas Profesionalizantes'],['multimedia','Videos'],['contactos','Contactos'],['reporte','Reporte directivos']]; document.getElementById('nav').innerHTML=items.map(i=>`<button id="nav-${i[0]}" onclick="show('${i[0]}')">${i[1]}</button>`).join('')} 
function openMailNotification(){alert('El acceso ahora es directo y no envía notificaciones por correo.')}
function renderStats(){let s=DATA.students; let en=s.filter(x=>x.estadoPractica.includes('EN CURSO')).length; let man=s.filter(x=>x.estadoPractica.includes('COMIENZA')).length; let emp=new Set(s.map(x=>x.empresaAsignada||x.empresa).filter(Boolean)).size; let views=localStorage.getItem('ppViewCounter2026')||'0'; document.getElementById('stats').innerHTML=`<div class="stat"><b>${views}</b>Vistas registradas</div><div class="stat"><b>${s.length}</b>Alumnos 7°A y 7°B</div><div class="stat"><b>${emp}</b>Empresas / destinos</div><div class="stat"><b>${en}</b>En curso</div><div class="stat"><b>${man}</b>Comienzan mañana</div><div class="stat"><b>${DATA.cfp.length}</b>CFP 401 en curso</div>`}
function renderFooter(){let c=DATA.contacts; document.getElementById('footer').innerHTML=`<b>Directora:</b> ${esc(c.Directora)} · <b>Vice-Director:</b> ${esc(c['Vice-Director'])}<br><b>Jefe de Área:</b> ${esc(c['Jefe de Área'])}<br><b>Docentes referentes:</b> ${esc(c['Docentes referentes'])}<br><b>E-mails:</b> ${esc(c.Emails)}<br><b>Urgencias:</b> ${esc(c.Emergencias)}<br><b>Responsable de página:</b> Sequeira Diego - 1160500515`}
function filters(course){return `<div class="filters no-print"><input id="q" oninput="renderStudents('${course}')" placeholder="Buscar por apellido, DNI, empresa, teléfono..."><select id="femp" onchange="renderStudents('${course}')"><option value="">Todas las empresas</option>${[...new Set(DATA.students.map(x=>x.empresaAsignada||x.empresa).filter(Boolean))].sort().map(e=>`<option>${esc(e)}</option>`).join('')}</select><select id="fest" onchange="renderStudents('${course}')"><option value="">Todos los estados</option><option>EN CURSO</option><option>COMIENZA MAÑANA</option><option>Pendiente</option></select><button class="success" onclick="exportCSV()">Exportar CSV</button></div>`}
function renderStudents(course=''){let q=(document.getElementById('q')?.value||'').toLowerCase();let fe=document.getElementById('femp')?.value||'';let fs=document.getElementById('fest')?.value||'';let rows=DATA.students.filter(s=>(!course||course=='alumnos'||s.curso==course)&&(!fe||(s.empresaAsignada||s.empresa)==fe)&&(!fs||s.estadoPractica.includes(fs))&&(Object.values(s).join(' ').toLowerCase().includes(q))); let table=`<div class="table-wrap"><table><thead><tr><th>Ranking</th><th>Curso</th><th>Apellido y nombre</th><th>DNI</th><th>Prom.</th><th>Tel. alumno</th><th>Adulto responsable</th><th>Empresa asignada</th><th>PID</th><th>Talles</th><th>CV</th><th>Act. 2</th><th>Estado</th><th>Ver</th></tr></thead><tbody>`+rows.map(s=>`<tr><td>${esc(s.rank)}</td><td>${s.curso}</td><td><b>${esc(s.nombre)}</b></td><td>${esc(s.dni)}</td><td>${esc(s.promedio)}</td><td>${esc(s.celAlumno||s.celEmpresa)}</td><td>${esc(s.telResponsable)}</td><td>${esc(s.empresaAsignada||s.empresa||s.destino)}</td><td>${esc(s.pid)}</td><td>Pan: ${esc(s.pantalon)}<br>Zap: ${esc(s.zapatos)}<br>Buzo: ${esc(s.buzo)}<br>Rem: ${esc(s.remera)}</td><td>${badgeStatus(getDoc(s.dni,'cv'))}</td><td>${badgeStatus(getDoc(s.dni,'act2'))}</td><td>${badgeStatus(s.estadoPractica)}</td><td><button onclick="studentModal('${s.dni}')">Ficha</button></td></tr>`).join('')+`</tbody></table></div>`; document.getElementById('studentsArea').innerHTML=table}
function show(view){currentView=view; document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); let nb=document.getElementById('nav-'+view); if(nb)nb.classList.add('active'); let c=document.getElementById('content'); if(view==='panel') c.innerHTML=panel(); else if(['7A','7B','alumnos'].includes(view)){c.innerHTML=`<h2>Listado de alumnos ${view==='alumnos'?'A-Z':view}</h2><p class="small">Sequeira Diego - 1160500515. Los estados de CV y Actividad 2 se verifican marcándolos desde la ficha del alumno, usando los enlaces a Drive.</p>${filters(view)}<div id="studentsArea"></div>`; renderStudents(view)} else if(view==='empresas') c.innerHTML=companies(); else if(view==='cfp') c.innerHTML=cfp(); else if(view==='documentos') c.innerHTML=docs(); else if(view==='seguros') c.innerHTML=infoDoc('seguros'); else if(view==='accidentes') c.innerHTML=infoDoc('accidentes'); else if(view==='evaluacion') c.innerHTML=infoDoc('evaluacion'); else if(view==='practicas') c.innerHTML=infoDoc('normativa'); else if(view==='multimedia') c.innerHTML=multimedia(); else if(view==='contactos') c.innerHTML=contacts(); else if(view==='reporte') c.innerHTML=reporte();}
function panel(){let current=DATA.students.filter(s=>s.estadoPractica.includes('EN CURSO')||s.estadoPractica.includes('COMIENZA'));return `<h2>Panel de control</h2><div class="notice"><b>Actualización solicitada:</b> ESTRUCMAR y CFP 401 ya figuran EN CURSO. SAICO, Secretaría de Obras Públicas y VETANCO figuran como COMIENZA MAÑANA. Página optimizada conservando botones, buscadores, empresas, videos, contactos y descargas PDF.</div><div class="cards"><div class="card"><h3>Drive 7°A</h3><p>Verificar CV y Actividad 2.</p><a class="btn primary" href="${DRIVE_7A}" target="_blank">Abrir carpeta 7°A</a></div><div class="card"><h3>Drive 7°B</h3><p>Verificar CV y Actividad 2.</p><a class="btn primary" href="${DRIVE_7B}" target="_blank">Abrir carpeta 7°B</a></div><div class="card"><h3>Descargas</h3><p>Normativa, evaluación, seguros, accidente, reunión y reporte.</p><button class="success" onclick="show('documentos')">Ir a PDF</button></div></div><h3>Estado operativo</h3><div class="table-wrap"><table><thead><tr><th>Alumno</th><th>Curso</th><th>Empresa</th><th>Estado</th></tr></thead><tbody>${current.map(s=>`<tr><td>${esc(s.nombre)}</td><td>${s.curso}</td><td>${esc(s.empresaAsignada||s.empresa)}</td><td>${badgeStatus(s.estadoPractica)}</td></tr>`).join('')}</tbody></table></div>`}
function companies(){let html='<h2>Empresas / PIDs / Rotaciones</h2><p class="small">Vista completa tomada del Excel. Incluye PIDs, rotaciones, talles y alumnos cargados por empresa.</p><input class="no-print" id="qemp" placeholder="Buscar empresa, alumno, PID..." oninput="filterCompanies()"><div id="companyArea">'; Object.entries(DATA.companyTables).forEach(([name,rows])=>{html+=`<section class="card companyBlock" data-search="${esc((name+' '+rows.flat().join(' ')).toLowerCase())}"><h3>${esc(name)}</h3><div class="table-wrap"><table><tbody>`; rows.forEach(r=>{let isTitle=r.join(' ').match(/PID|ROTACION|TURNO|SERENISIMA|ESTRUCMAR|VETANCO|SAICO|YAMAHA|PREMEC|VERNET/i); html+=`<tr class="${isTitle?'company-title':''}">${r.map(v=>`<td>${esc(v)}</td>`).join('')}</tr>`}); html+='</tbody></table></div></section>'}); return html+'</div>'}
function filterCompanies(){let q=(document.getElementById('qemp').value||'').toLowerCase();document.querySelectorAll('.companyBlock').forEach(b=>b.style.display=b.dataset.search.includes(q)?'block':'none')}
function cfp(){return `<h2>CFP 401 - Especialización Profesional Instalador de Sistemas Solares Térmicos</h2><div class="notice"><b>Estado:</b> EN CURSO. Inicio 31/03/2026. Martes y miércoles de 08:00 a 12:00. Carga total 120 horas. Finalización 08/07/2026.</div><div class="table-wrap"><table><thead><tr><th>Curso</th><th>Alumno</th><th>Estado</th></tr></thead><tbody>${DATA.cfp.map(x=>`<tr><td>${esc(x.curso)}</td><td>${esc(x.alumno)}</td><td>${badgeStatus(x.estado)}</td></tr>`).join('')}</tbody></table></div>`}
function docs(){return `<h2>Descarga de PDF correspondientes</h2><div class="download-grid">${Object.keys(DOCS).map(k=>`<div class="card"><h3>${DOCS[k].split('|')[0]}</h3><p>${DOCS[k].split('|')[1].slice(0,140)}...</p><button class="primary" onclick="downloadPDF('${k}')"><i class="fa-solid fa-file-pdf"></i> Descargar PDF</button></div>`).join('')}</div><div class="notice">Además podés imprimir cualquier pantalla desde el botón Imprimir del navegador. Los PDF se generan automáticamente desde esta página.</div>`}
function infoDoc(k){let [t,b]=DOCS[k].split('|');return `<h2>${t}</h2><p>${b}</p><button class="primary" onclick="downloadPDF('${k}')">Descargar PDF</button>`}
function multimedia(){return `<h2>Videos relacionados</h2><div class="video-grid">${VIDEOS.map(v=>`<iframe src="${v}" allowfullscreen></iframe>`).join('')}</div>`}
function contacts(){return `<h2>Contactos institucionales y urgencias</h2><div class="cards">${Object.entries(DATA.contacts).map(([k,v])=>`<div class="card"><h3>${esc(k)}</h3><p>${esc(v)}</p></div>`).join('')}</div>`}
function reporte(){let rows=DATA.students.filter(s=>s.estadoPractica.includes('EN CURSO')||s.estadoPractica.includes('COMIENZA'));return `<h2>Reporte para directivos, jefes de área y docentes</h2><button class="primary no-print" onclick="downloadPDF('reporte')">Descargar PDF de reporte</button><div class="table-wrap"><table><thead><tr><th>Alumno</th><th>Curso</th><th>Empresa</th><th>Turno/Estado</th><th>Tel. alumno</th><th>Adulto responsable</th><th>CV</th><th>Actividad 2</th></tr></thead><tbody>${rows.map(s=>`<tr><td>${esc(s.nombre)}</td><td>${s.curso}</td><td>${esc(s.empresaAsignada||s.empresa)}</td><td>${badgeStatus(s.estadoPractica)}</td><td>${esc(s.celAlumno||s.celEmpresa)}</td><td>${esc(s.telResponsable)}</td><td>${esc(getDoc(s.dni,'cv'))}</td><td>${esc(getDoc(s.dni,'act2'))}</td></tr>`).join('')}</tbody></table></div>`}
function studentModal(dni){let s=DATA.students.find(x=>x.dni==dni); if(!s)return; let drive=s.curso==='7A'?DRIVE_7A:DRIVE_7B; let matches=(s.detallesEmpresa||[]).map(m=>`<li><b>${esc(m.empresaHoja)} PID ${esc(m.pid)}</b><br>${esc(m.fila)}<br>Talles: ${esc(JSON.stringify(m.talles))}</li>`).join('')||'<li>Sin fila específica detectada en empresa.</li>'; document.getElementById('modalBody').innerHTML=`<h2>Ficha del alumno - ${esc(s.nombre)}</h2><div class="cards"><div class="card"><h3>Datos personales</h3><p><b>Curso:</b> ${s.curso}<br><b>DNI:</b> ${esc(s.dni)}<br><b>Promedio:</b> ${esc(s.promedio)}<br><b>Tel. alumno:</b> ${esc(s.celAlumno||s.celEmpresa)}<br><b>Adulto responsable:</b> ${esc(s.telResponsable)}<br><b>Email:</b> ${esc(s.email)}<br><b>Nacimiento:</b> ${esc(s.fechaNacimiento)}</p></div><div class="card"><h3>Práctica</h3><p><b>Empresa asignada:</b> ${esc(s.empresaAsignada||s.empresa||s.destino)}<br><b>PID:</b> ${esc(s.pid)}<br><b>Estado:</b> ${badgeStatus(s.estadoPractica)}<br><b>Observaciones:</b> ${esc(s.observaciones)}</p></div><div class="card"><h3>Talles / elementos</h3><p><b>Pantalón:</b> ${esc(s.pantalon)}<br><b>Zapatos:</b> ${esc(s.zapatos)}<br><b>Buzo:</b> ${esc(s.buzo)}<br><b>Remera:</b> ${esc(s.remera)}</p></div><div class="card"><h3>Drive - CV y Actividad 2</h3><p><b>CV:</b> ${badgeStatus(getDoc(s.dni,'cv'))}<br><b>Actividad 2:</b> ${badgeStatus(getDoc(s.dni,'act2'))}</p><a class="btn primary" href="${drive}" target="_blank">Abrir Drive del curso</a><br><br><select onchange="setDoc('${s.dni}','cv',this.value)"><option>CV pendiente</option><option>CV subido</option><option>CV observado</option><option>No verificado</option></select><br><br><select onchange="setDoc('${s.dni}','act2',this.value)"><option>Actividad 2 pendiente</option><option>Actividad 2 subida</option><option>Actividad 2 observada</option><option>No verificado</option></select></div></div><h3>Registro detectado en empresas</h3><ul>${matches}</ul><button class="success" onclick="downloadStudentPDF('${s.dni}')">Descargar ficha PDF</button>`; document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none'}
function downloadPDF(k){let [title,body]=DOCS[k].split('|'); const {jsPDF}=window.jspdf; const pdf=new jsPDF(); pdf.setFontSize(16); pdf.text(title,15,20); pdf.setFontSize(10); pdf.text('EEST N°1 Javier Tapié - Prácticas Profesionalizantes 2026 - Sequeira Diego',15,28); pdf.setFontSize(11); pdf.text(pdf.splitTextToSize(body,180),15,42); pdf.text('Contactos: Directora Scotto Paola 01124605012 | Vice-Director López Alejandro 1126972148 | Sequeira Diego 1160500515',15,270); pdf.save(title.replaceAll(' ','_')+'.pdf')}
function downloadStudentPDF(dni){let s=DATA.students.find(x=>x.dni==dni); const {jsPDF}=window.jspdf; const pdf=new jsPDF(); pdf.setFontSize(16); pdf.text('Ficha de alumno - Prácticas Profesionalizantes',15,20); pdf.setFontSize(11); let lines=[`Alumno: ${s.nombre}`, `Curso: ${s.curso}`, `DNI: ${s.dni}`, `Tel. alumno: ${s.celAlumno||s.celEmpresa}`, `Adulto responsable: ${s.telResponsable}`, `Empresa: ${s.empresaAsignada||s.empresa||s.destino}`, `PID: ${s.pid}`, `Estado: ${s.estadoPractica}`, `Pantalón: ${s.pantalon} | Zapatos: ${s.zapatos} | Buzo: ${s.buzo} | Remera: ${s.remera}`, `CV: ${getDoc(s.dni,'cv')} | Actividad 2: ${getDoc(s.dni,'act2')}`, 'Responsable: Sequeira Diego - 1160500515']; pdf.text(pdf.splitTextToSize(lines.join('\n'),180),15,35); pdf.save('Ficha_'+s.nombre.replaceAll(' ','_')+'.pdf')}
function exportCSV(){let rows=[['Curso','Ranking','Alumno','DNI','Tel alumno','Adulto responsable','Empresa','PID','Pantalon','Zapatos','Buzo','Remera','CV','Actividad 2','Estado']].concat(DATA.students.map(s=>[s.curso,s.rank,s.nombre,s.dni,s.celAlumno||s.celEmpresa,s.telResponsable,s.empresaAsignada||s.empresa||s.destino,s.pid,s.pantalon,s.zapatos,s.buzo,s.remera,getDoc(s.dni,'cv'),getDoc(s.dni,'act2'),s.estadoPractica])); let csv=rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(';')).join('\n'); let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='practicas_profesionalizantes_2026.csv';a.click()}
window.addEventListener('load',()=>{if(localStorage.getItem('ppUser')){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';init()}})
</script></body></html>
